<!DOCTYPE html>
<html>
<head>
  <title>Client Sign Up</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="container">
    <div class="form-box">
      <h2>Client Sign Up</h2>

      <form action="/add-client" method="POST">

        <label>Client Name:</label>
        <input type="text" name="name" required>

        <label>Client Email:</label>
        <input type="email" name="email" required>

        <label>Client Phone Number:</label>
        <input type="text" name="phone_num" required>

        <input type="hidden" id="latitude" name="latitude">
        <input type="hidden" id="longitude" name="longitude">

        <button type="button" onclick="getLocation()">Use My Current Location</button>
        <button type="submit" onclick="return validateLocation()">Submit</button>

      </form>

      <div class="location-info">
        <p><strong>Latitude:</strong> <span id="lat">-</span></p>
        <p><strong>Longitude:</strong> <span id="lng">-</span></p>
      </div>
    </div>
  </div>

  <script>
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            document.getElementById("lat").innerText = lat;
            document.getElementById("lng").innerText = lng;

            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lng;

            alert("Location captured successfully!");
          },
          function(error) {
            alert("Unable to get location.");
            console.error(error);
          }
        );
      } else {
        alert("Your browser does not support location.");
      }
    }

    function validateLocation() {
      const lat = document.getElementById("latitude").value;
      const lng = document.getElementById("longitude").value;

      if (!lat || !lng) {
        alert("Please click 'Use My Current Location' first.");
        return false;
      }

      return true;
    }
  </script>

</body>
</html>
