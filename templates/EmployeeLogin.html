<!DOCTYPE html>
<html>
<head>
  <title>Employee Login</title>
</head>
<body>

  <h2>Employee Login</h2>

  <form action="/verify-employee-login" method="POST">

    <label for="email">Employee Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="phone_num">Employee Phone Number:</label><br>
    <input type="text" id="phone_num" name="phone_num" placeholder="Enter 10-digit phone number" required><br><br>

    <button type="submit">Login</button>

  </form>

</body>
</html>
