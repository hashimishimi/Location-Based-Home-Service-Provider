<!DOCTYPE html>
<html>
<head>
  <title>Client Login</title>
</head>
<body>

  <h2>Client Login</h2>

  <form action="/send-client-otp" method="POST">

    <label for="email">Client Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="phone_num">Client Phone Number:</label><br>
    <input type="text" id="phone_num" name="phone_num" placeholder="Enter 10-digit phone number" required><br><br>

    <button type="submit">Login</button>

  </form>

</body>
</html>
